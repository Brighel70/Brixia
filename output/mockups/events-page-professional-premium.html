<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mockup Eventi Professional Premium</title>
  <style>
    :root {
      --bg: #eef3f8;
      --navy: #111a33;
      --navy-2: #283250;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #d9e2ec;
      --soft: #f7f9fc;
      --blue: #2563eb;
      --green: #087f5b;
      --amber: #a16207;
      --red: #dc2626;
      --violet: #6d28d9;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--bg);
    }

    button, input, select { font: inherit; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 224px 1fr;
    }

    .sidebar {
      padding: 22px 16px;
      color: #dce4f2;
      background: linear-gradient(180deg, #30395d, #242b49);
      border-right: 1px solid rgba(255, 255, 255, .08);
    }

    .brand {
      height: 64px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: #ffffff;
      font-size: 22px;
      font-weight: 850;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: #3b82f6;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav button {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 0;
      border-radius: 10px;
      color: #dce4f2;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .nav button.active {
      color: #ffffff;
      background: rgba(37, 99, 235, .22);
      box-shadow: inset 3px 0 0 #60a5fa;
    }

    .shell {
      min-width: 0;
      display: grid;
      grid-template-rows: 68px 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 0 24px;
      color: #ffffff;
      background: #30395d;
      border-bottom: 1px solid rgba(255, 255, 255, .10);
    }

    .topbar h1 {
      margin: 0;
      font-size: 21px;
      letter-spacing: 0;
    }

    .kpis {
      display: flex;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }

    .kpi {
      min-width: 104px;
      height: 42px;
      display: grid;
      place-items: center;
      padding: 5px 10px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 12px;
      background: rgba(255, 255, 255, .07);
      text-align: center;
    }

    .kpi span {
      display: block;
      color: #cbd5e1;
      font-size: 9px;
      font-weight: 850;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .kpi strong {
      display: block;
      margin-top: 1px;
      color: #ffffff;
      font-size: 18px;
      line-height: 1;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-tile {
      width: 48px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(255, 255, 255, .08);
    }

    .logo-tile img {
      width: 36px;
      height: 30px;
      object-fit: contain;
    }

    .add-btn {
      height: 40px;
      min-width: 46px;
      border: 0;
      border-radius: 10px;
      color: #ffffff;
      background: #2563eb;
      font-size: 24px;
      cursor: pointer;
    }

    .page {
      min-width: 0;
      padding: 18px 22px 24px;
      overflow: auto;
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto minmax(320px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .segmented, .view-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
    }

    .segmented button, .view-switch button {
      min-height: 34px;
      padding: 0 13px;
      border: 0;
      border-radius: 8px;
      color: #475467;
      background: transparent;
      font-weight: 750;
      cursor: pointer;
    }

    .segmented button.active, .view-switch button.active {
      color: #ffffff;
      background: var(--navy);
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) 150px 160px 38px;
      gap: 8px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
    }

    .field {
      min-width: 0;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border: 1px solid #e4ebf3;
      border-radius: 10px;
      background: var(--soft);
    }

    .field input, .field select {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--ink);
      background: transparent;
      font-size: 13px;
    }

    .reset {
      border: 0;
      border-radius: 10px;
      color: #64748b;
      background: #f1f5f9;
      cursor: pointer;
    }

    .board {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(16, 24, 40, .06);
    }

    .table-head, .event-row {
      display: grid;
      grid-template-columns: 92px minmax(280px, 1fr) 132px 138px 150px 112px 132px 84px;
      align-items: center;
      gap: 10px;
    }

    .table-head {
      min-height: 42px;
      padding: 0 14px 0 0;
      color: #667085;
      background: #fbfcfe;
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .table-head span:first-child {
      padding-left: 16px;
    }

    .table-head span:nth-child(2),
    .event-main {
      padding-left: 28px;
    }

    .timeline {
      display: grid;
      gap: 0;
    }

    .date-row {
      height: 34px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: #2563eb;
      background: #f8fbff;
      border-bottom: 1px solid #e5edf6;
      font-size: 12px;
      font-weight: 850;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .event-row {
      min-height: 48px;
      padding: 4px 14px 4px 0;
      border-bottom: 1px solid #e5edf6;
      background: #ffffff;
      cursor: pointer;
    }

    .event-row:hover {
      background: #fbfdff;
    }

    .cat {
      width: 92px;
      height: 40px;
      display: grid;
      place-items: center;
      justify-self: stretch;
      color: #ffffff;
      background: var(--accent);
      font-size: 13px;
      font-weight: 900;
    }

    .event-main {
      min-width: 0;
      color: #003087;
      font-size: 13px;
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell {
      min-width: 0;
      color: #003087;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      height: 26px;
      padding: 0 10px;
      border-radius: 8px;
      background: #f2f4f7;
      color: #344054;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }

    .pill.win { color: var(--green); background: #e9f8f0; }
    .pill.gold { color: var(--amber); background: #fff5d6; }
    .pill.info { color: #1d4ed8; background: #edf4ff; }
    .pill.ok { color: var(--green); background: #dff8e9; }

    .calendar {
      display: none;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      padding: 12px;
      background: #ffffff;
    }

    .day {
      min-height: 104px;
      padding: 10px;
      border: 1px solid #e4ebf3;
      border-radius: 12px;
      background: #fbfdff;
    }

    .day strong {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .calendar-chip {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 6px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: #2563eb;
      font-size: 11px;
      font-weight: 800;
      text-align: left;
      cursor: pointer;
    }

    @media (max-width: 1280px) {
      .app { grid-template-columns: 82px 1fr; }
      .brand span, .nav span { display: none; }
      .toolbar { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr 1fr; }
      .table-head { display: none; }
      .event-row { grid-template-columns: 80px minmax(180px, 1fr) 110px; }
      .event-row .cell:nth-of-type(n+3), .event-row .pill { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><div class="brand-mark"></div><span>TeamFlow</span></div>
      <nav class="nav">
        <button><span>Dashboard</span></button>
        <button><span>Anagrafiche</span></button>
        <button><span>Squadre</span></button>
        <button class="active"><span>Eventi</span></button>
        <button><span>Quote</span></button>
        <button><span>Infermeria</span></button>
        <button><span>Report</span></button>
      </nav>
    </aside>

    <section class="shell">
      <header class="topbar">
        <h1>Eventi</h1>
        <div class="kpis">
          <article class="kpi"><span>Prossimo</span><strong>U18</strong></article>
          <article class="kpi"><span>Eventi</span><strong>5</strong></article>
          <article class="kpi"><span>Partite</span><strong>2</strong></article>
          <article class="kpi"><span>Tornei</span><strong>1</strong></article>
          <article class="kpi"><span>Consigli</span><strong>1</strong></article>
        </div>
        <div class="top-actions">
          <div class="logo-tile"><img src="../../public/logo-brixia-official.png" alt="Brixia Rugby" /></div>
          <button class="add-btn">+</button>
        </div>
      </header>

      <main class="page">
        <section class="toolbar">
          <div class="segmented">
            <button class="active" data-tab="eventi">Eventi</button>
            <button data-tab="archivio">Archiviate</button>
          </div>
          <div class="filters">
            <label class="field"><span>⌕</span><input id="search" placeholder="Cerca evento, luogo, squadra..." /></label>
            <label class="field"><select id="typeFilter"><option value="">Tutti i tipi</option><option>Partita</option><option>Torneo</option><option>Consiglio</option><option>Festa del Club</option></select></label>
            <label class="field"><select id="catFilter"><option value="">Tutte le categorie</option><option>U18</option><option>U12</option><option>B</option><option>CON</option><option>FDC</option></select></label>
            <button class="reset" id="reset">↺</button>
          </div>
          <div class="view-switch">
            <button class="active" data-view="timeline">Timeline</button>
            <button data-view="calendar">Mese</button>
          </div>
        </section>

        <section class="board">
          <div class="table-head" id="tableHead">
            <span>Cat.</span>
            <span>Evento</span>
            <span>Tipo</span>
            <span>Luogo</span>
            <span>Data</span>
            <span>Orario</span>
            <span>Esito</span>
            <span>Info</span>
          </div>
          <div class="timeline" id="timeline"></div>
          <div class="calendar" id="calendar"></div>
        </section>
      </main>
    </section>
  </div>

  <script>
    const events = [
      { id: 1, date: 'Sabato 4 luglio', day: 4, category: 'U18', accent: '#f2c400', type: 'Partita', tag: 'Campionato', title: 'Brixia U18 vs Castellana U18', place: 'Gussago', time: '18:30', outcome: '22 - 20', outcomeStyle: 'win', status: 'Vittoria' },
      { id: 2, date: 'Domenica 5 luglio', day: 5, category: 'U12', accent: '#356df3', type: 'Torneo', tag: 'Torneo', title: 'Due Laghi', place: 'Brescia', time: '10:00', outcome: 'Vinc. Brescia', outcomeStyle: 'gold', status: '32 sq.' },
      { id: 3, date: 'Domenica 5 luglio', day: 5, category: 'B', accent: '#ef4444', type: 'Partita', tag: 'Campionato', title: 'Bologna (B) vs Brixia (B)', place: 'Bologna', time: '14:30', outcome: '20 - 22', outcomeStyle: 'win', status: 'Vittoria' },
      { id: 4, date: 'Giovedi 16 luglio', day: 16, category: 'CON', accent: '#efd58a', type: 'Consiglio', tag: 'Consiglio', title: 'Consiglio del 16/07/2026', place: 'Brescia', time: '20:30-23:00', outcome: '7 partecipanti', outcomeStyle: 'info', status: '1 inv.' },
      { id: 5, date: 'Venerdi 24 luglio', day: 24, endDay: 26, category: 'FDC', accent: '#4267f5', type: 'Festa del Club', tag: 'Festa del Club', title: 'Festa della Birra', place: 'Gussago', time: '24 lug - 26 lug', outcome: '3 giorni', outcomeStyle: '', status: 'club' }
    ];

    let activeView = 'timeline';
    const timeline = document.getElementById('timeline');
    const calendar = document.getElementById('calendar');
    const tableHead = document.getElementById('tableHead');
    const search = document.getElementById('search');
    const typeFilter = document.getElementById('typeFilter');
    const catFilter = document.getElementById('catFilter');

    function filteredEvents() {
      const q = search.value.trim().toLowerCase();
      return events.filter(event => {
        if (typeFilter.value && event.type !== typeFilter.value) return false;
        if (catFilter.value && event.category !== catFilter.value) return false;
        return `${event.title} ${event.place} ${event.tag} ${event.category}`.toLowerCase().includes(q);
      });
    }

    function grouped(items) {
      return items.reduce((acc, event) => {
        if (!acc[event.date]) acc[event.date] = [];
        acc[event.date].push(event);
        return acc;
      }, {});
    }

    function eventRow(event) {
      const row = document.createElement('button');
      row.className = 'event-row';
      row.style.setProperty('--accent', event.accent);
      row.innerHTML = `
        <div class="cat">${event.category}</div>
        <div class="event-main">${event.title}</div>
        <div class="cell">${event.tag}</div>
        <div class="cell">${event.place}</div>
        <div class="cell">${event.date}</div>
        <div class="cell">${event.time}</div>
        <div class="pill ${event.outcomeStyle}">${event.outcome}</div>
        <div class="pill ok">${event.status}</div>
      `;
      return row;
    }

    function renderTimeline(items) {
      timeline.innerHTML = '';
      Object.entries(grouped(items)).forEach(([date, dateEvents]) => {
        const label = document.createElement('div');
        label.className = 'date-row';
        label.textContent = '▦ ' + date;
        timeline.appendChild(label);
        dateEvents.forEach(event => timeline.appendChild(eventRow(event)));
      });
    }

    function renderCalendar(items) {
      calendar.innerHTML = '';
      for (let day = 1; day <= 28; day++) {
        const cell = document.createElement('div');
        cell.className = 'day';
        cell.innerHTML = `<strong>${day}</strong>`;
        items.filter(event => day >= event.day && day <= (event.endDay || event.day)).forEach(event => {
          const chip = document.createElement('button');
          chip.className = 'calendar-chip';
          chip.style.background = event.accent;
          chip.textContent = event.endDay ? `${event.category} giorno ${day - event.day + 1}` : `${event.category} ${event.time}`;
          cell.appendChild(chip);
        });
        calendar.appendChild(cell);
      }
    }

    function render() {
      const items = filteredEvents();
      timeline.style.display = activeView === 'timeline' ? 'grid' : 'none';
      calendar.style.display = activeView === 'calendar' ? 'grid' : 'none';
      tableHead.style.display = activeView === 'timeline' ? 'grid' : 'none';
      renderTimeline(items);
      renderCalendar(items);
    }

    document.querySelectorAll('.view-switch button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.view-switch button').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
        activeView = button.dataset.view;
        render();
      });
    });

    [search, typeFilter, catFilter].forEach(control => control.addEventListener('input', render));
    document.getElementById('reset').addEventListener('click', () => {
      search.value = '';
      typeFilter.value = '';
      catFilter.value = '';
      render();
    });

    render();
  </script>
</body>
</html>
